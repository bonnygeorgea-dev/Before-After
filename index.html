<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Maker · EMD-KOR</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23006B99'/%3E%3Ctext x='32' y='42' font-size='30' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EBA%3C/text%3E%3C/svg%3E">
<style>
  :root{ --teal:#006B99; --teal-d:#00527a; --grey:#595959; --line:#e2e6ea; --bg:#f4f6f8; --safe:env(safe-area-inset-bottom,0px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ -webkit-text-size-adjust:100%; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
        background:var(--bg); color:#222; font-size:15px; padding-bottom:40px; }
  header{ background:var(--teal); color:#fff; padding:14px 16px; display:flex; align-items:center;
          justify-content:space-between; box-shadow:0 2px 6px rgba(0,0,0,.15); position:sticky; top:0; z-index:5;
          padding-top:calc(14px + env(safe-area-inset-top,0px)); }
  header h1{ margin:0; font-size:17px; font-weight:700; letter-spacing:.3px; }
  header .ver{ font-size:11px; opacity:.85; }
  .wrap{ max-width:1000px; margin:0 auto; padding:14px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px;
         box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .drops{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .drop{ border:2px dashed #c3ccd4; border-radius:12px; min-height:150px; display:flex; flex-direction:column;
         align-items:center; justify-content:center; text-align:center; padding:12px; cursor:pointer;
         background:#fafbfc; transition:.15s; position:relative; overflow:hidden; }
  .drop:hover{ border-color:var(--teal); background:#f0f8fc; }
  .drop.filled{ border-style:solid; border-color:var(--teal); padding:0; background:#000; }
  .drop.dragover{ border-color:var(--teal); background:#e6f4fb; }
  .drop .tag{ position:absolute; top:8px; left:8px; background:var(--teal); color:#fff; font-size:11px;
              font-weight:700; padding:3px 9px; border-radius:6px; z-index:2; }
  .drop img{ max-width:100%; max-height:230px; display:block; }
  .drop .hint{ color:#7a848d; font-size:13px; line-height:1.35; }
  .drop .hint b{ color:var(--teal); }
  .drop .clear{ position:absolute; top:8px; right:8px; background:rgba(0,0,0,.6); color:#fff; border:none;
                width:34px; height:34px; border-radius:50%; font-size:20px; cursor:pointer; z-index:3; line-height:1;
                display:flex; align-items:center; justify-content:center; }
  .controls{ display:flex; flex-wrap:wrap; gap:14px 16px; align-items:flex-end; }
  .fld{ display:flex; flex-direction:column; gap:5px; }
  .fld label{ font-size:11px; font-weight:700; color:var(--grey); text-transform:uppercase; letter-spacing:.4px; }
  .fld input[type=text]{ padding:11px 12px; border:1px solid #cdd4da; border-radius:9px; font-size:16px; width:160px; }
  .fld input[type=text]:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(0,107,153,.15); }
  .seg{ display:inline-flex; border:1px solid #cdd4da; border-radius:9px; overflow:hidden; }
  .seg button{ border:none; background:#fff; padding:11px 14px; font-size:14px; cursor:pointer; color:#444; min-height:44px; }
  .seg button.on{ background:var(--teal); color:#fff; font-weight:700; }
  .chk{ display:flex; align-items:center; gap:9px; font-size:14px; cursor:pointer; min-height:40px; }
  .chk input{ width:20px; height:20px; accent-color:var(--teal); }
  .btns{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
  button.act{ border:none; border-radius:10px; padding:13px 18px; font-size:15px; font-weight:700; cursor:pointer; min-height:48px; }
  .primary{ background:var(--teal); color:#fff; } .primary:hover{ background:var(--teal-d); }
  .ghost{ background:#fff; color:var(--teal); border:1.5px solid var(--teal) !important; }
  .ghost:hover{ background:#f0f8fc; }
  .sec{ background:#eef1f4; color:#444; } .sec:hover{ background:#e2e6ea; }
  button.act:active{ transform:scale(.98); }
  button.act:disabled{ opacity:.45; cursor:not-allowed; }
  .previewBox{ text-align:center; background:#eceff2; border:1px solid var(--line); border-radius:12px;
               padding:12px; min-height:120px; display:flex; align-items:center; justify-content:center; }
  #preview{ max-width:100%; height:auto; border-radius:6px; box-shadow:0 3px 12px rgba(0,0,0,.18); }
  .empty{ color:#8a939b; font-size:13px; }
  .note{ font-size:12px; color:#8a939b; margin-top:8px; }
  footer{ text-align:center; color:#8a939b; font-size:11.5px; padding:18px 12px 6px; }
  .toast{ position:fixed; bottom:calc(20px + var(--safe)); left:50%; transform:translateX(-50%); background:#222; color:#fff;
          padding:11px 20px; border-radius:24px; font-size:14px; opacity:0; pointer-events:none; transition:.25s; z-index:99; }
  .toast.show{ opacity:1; }

  /* ---------- MOBILE ---------- */
  @media(max-width:640px){
    .wrap{ padding:10px; }
    .card{ padding:12px; border-radius:11px; margin-bottom:11px; }
    .drop{ min-height:128px; }
    .drop img{ max-height:180px; }
    .drop .hint{ font-size:12px; }
    .controls{ gap:14px; }
    .fld{ flex:1 1 100%; }
    .fld input[type=text]{ width:100%; }
    .seg{ width:100%; }
    .seg button{ flex:1; }
    .chk{ flex:1 1 100%; }
    .card .btns .act{ flex:1 1 auto; }
    /* sticky export bar always in thumb reach */
    #exportBar{ position:fixed; left:0; right:0; bottom:0; margin:0; z-index:20;
                padding:10px 12px calc(10px + var(--safe)); background:#fff;
                border-top:1px solid var(--line); box-shadow:0 -3px 12px rgba(0,0,0,.1); }
    #exportBar .act{ flex:1; }
    #exportNote{ display:none; }
    body{ padding-bottom:calc(78px + var(--safe)); }
  }
</style>
</head>
<body>

<header>
  <h1>Before / After Maker</h1>
  <span class="ver" id="verlabel"></span>
</header>

<div class="wrap">

  <div class="card">
    <div class="drops">
      <div class="drop" id="dropA" data-slot="A">
        <span class="tag">BEFORE</span>
        <div class="hint">Tap or drop the <b>Before</b> photo</div>
        <input type="file" accept="image/*" hidden>
      </div>
      <div class="drop" id="dropB" data-slot="B">
        <span class="tag">AFTER</span>
        <div class="hint">Tap or drop the <b>After</b> photo</div>
        <input type="file" accept="image/*" hidden>
      </div>
    </div>
    <div class="btns">
      <button class="act sec" id="swapBtn">⇄ Swap Before / After</button>
      <button class="act sec" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <div class="fld">
        <label>Layout</label>
        <div class="seg" id="layoutSeg">
          <button data-v="h" class="on">Side by side</button>
          <button data-v="v">Stacked</button>
        </div>
      </div>
      <div class="fld">
        <label>Image fit</label>
        <div class="seg" id="fitSeg">
          <button data-v="cover" class="on">Fill (crop)</button>
          <button data-v="contain">Fit (whole)</button>
        </div>
      </div>
      <div class="fld">
        <label>Before label</label>
        <input type="text" id="labelA" value="Before">
      </div>
      <div class="fld">
        <label>After label</label>
        <input type="text" id="labelB" value="After">
      </div>
      <div class="fld">
        <label>Bottom watermark</label>
        <input type="text" id="wmText" value="EMD - KOR">
      </div>
      <label class="chk"><input type="checkbox" id="showLabels" checked> Show labels</label>
      <label class="chk"><input type="checkbox" id="showDate"> Add date to watermark</label>
    </div>
  </div>

  <div class="card">
    <div class="previewBox">
      <canvas id="preview"></canvas>
      <div class="empty" id="emptyMsg">Add both photos to see the preview</div>
    </div>
    <div class="btns" id="exportBar">
      <button class="act primary" id="downloadBtn" disabled>⬇ Download PNG</button>
      <button class="act ghost" id="copyBtn" disabled>📋 Copy image</button>
    </div>
    <div class="note" id="exportNote">Everything runs on this device — your photos are never uploaded anywhere.</div>
  </div>

  <footer>
    Bonny George · MGP, Koratty Plant &nbsp;·&nbsp; <span id="foot"></span>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const APP_VERSION = 'v1.1';
const LAST_UPDATED = '09 Jul 2026';
const CELL = 1400;      // per-cell long-side target (px) for output quality
document.getElementById('verlabel').textContent = APP_VERSION;
document.getElementById('foot').textContent = APP_VERSION + ' · ' + LAST_UPDATED;

/* ============ STATE ============ */
const state = { imgA:null, imgB:null, layout:'h', fit:'cover' };
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');

/* ============ FILE HANDLING ============ */
function wireDrop(id){
  const el = document.getElementById(id);
  const input = el.querySelector('input');
  const slot = el.dataset.slot;
  el.addEventListener('click', e=>{ if(e.target.classList.contains('clear')) return; input.click(); });
  input.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0], slot); input.value=''; });
  el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', ()=> el.classList.remove('dragover'));
  el.addEventListener('drop', e=>{
    e.preventDefault(); el.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if(f && f.type.startsWith('image/')) loadFile(f, slot);
  });
}
wireDrop('dropA'); wireDrop('dropB');

function loadFile(file, slot){
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{ state['img'+slot] = img; showThumb(slot, ev.target.result); render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showThumb(slot, src){
  const el = document.getElementById('drop'+slot);
  const tagText = slot==='A' ? 'BEFORE' : 'AFTER';
  el.classList.add('filled');
  el.innerHTML = '<span class="tag">'+tagText+'</span>'+
                 '<button class="clear" title="Remove">×</button>'+
                 '<img src="'+src+'">';
  el.querySelector('.clear').addEventListener('click', ev=>{
    ev.stopPropagation(); clearSlot(slot);
  });
}

function clearSlot(slot){
  state['img'+slot] = null;
  const el = document.getElementById('drop'+slot);
  const tagText = slot==='A' ? 'BEFORE' : 'AFTER';
  const which  = slot==='A' ? 'Before' : 'After';
  el.classList.remove('filled');
  el.innerHTML = '<span class="tag">'+tagText+'</span>'+
                 '<div class="hint">Tap or drop the <b>'+which+'</b> photo</div>'+
                 '<input type="file" accept="image/*" hidden>';
  el.querySelector('input').addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0], slot); e.target.value=''; });
  render();
}

/* ============ CONTROLS ============ */
function wireSeg(id, key){
  document.querySelectorAll('#'+id+' button').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); state[key]=b.dataset.v; render();
    });
  });
}
wireSeg('layoutSeg','layout');
wireSeg('fitSeg','fit');
['labelA','labelB','wmText','showLabels','showDate'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('swapBtn').addEventListener('click', ()=>{
  const a = state.imgA, b = state.imgB;
  if(a) showThumb('A', b?b.src:'' ); // placeholder handled below
  // simplest: swap sources and rebuild thumbs
  const asrc = a?a.src:null, bsrc = b?b.src:null;
  if(asrc) { state.imgB = a; showThumb('B', asrc); } else clearSlot('B');
  if(bsrc) { state.imgA = b; showThumb('A', bsrc); } else clearSlot('A');
  render();
});
document.getElementById('resetBtn').addEventListener('click', ()=>{ clearSlot('A'); clearSlot('B'); });
document.getElementById('downloadBtn').addEventListener('click', download);
document.getElementById('copyBtn').addEventListener('click', copyImg);

/* ============ DRAW HELPERS ============ */
function drawFit(img, x, y, w, h, mode){
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.fillStyle = '#000'; ctx.fillRect(x, y, w, h);
  const iw = img.naturalWidth, ih = img.naturalHeight;
  let scale = (mode==='cover') ? Math.max(w/iw, h/ih) : Math.min(w/iw, h/ih);
  const dw = iw*scale, dh = ih*scale;
  ctx.drawImage(img, x + (w-dw)/2, y + (h-dh)/2, dw, dh);
  ctx.restore();
}

function drawLabel(text, x, y, cellH){
  if(!text) return;
  const fs = Math.round(cellH * 0.085);
  const pad = Math.round(cellH * 0.035);
  ctx.font = '700 ' + fs + 'px -apple-system, "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0,0,0,0.65)';
  ctx.shadowBlur = fs*0.18; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 3;
  ctx.lineWidth = fs*0.10; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(text, x+pad, y+pad);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, x+pad, y+pad);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
}

/* ============ RENDER ============ */
function render(){
  const a = state.imgA, b = state.imgB;
  const ready = a && b;
  document.getElementById('downloadBtn').disabled = !ready;
  document.getElementById('copyBtn').disabled = !ready || !navigator.clipboard || !window.ClipboardItem;
  document.getElementById('emptyMsg').style.display = ready ? 'none' : 'block';
  canvas.style.display = ready ? 'block' : 'none';
  if(!ready) return;

  const showLabels = document.getElementById('showLabels').checked;
  const labelA = document.getElementById('labelA').value.trim();
  const labelB = document.getElementById('labelB').value.trim();
  let wm = document.getElementById('wmText').value.trim();
  if(document.getElementById('showDate').checked){
    const d = new Date();
    const ds = String(d.getDate()).padStart(2,'0')+'-'+
               ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+'-'+d.getFullYear();
    wm = wm ? (wm + '   ·   ' + ds) : ds;
  }

  // reference aspect from the BEFORE image
  const refAspect = a.naturalWidth / a.naturalHeight;
  const gap = 8;
  let cellW, cellH, canvasW, canvasH, wmH;

  if(state.layout === 'h'){
    cellH = CELL;
    cellW = Math.round(cellH * refAspect);
    canvasW = cellW*2 + gap;
    wmH = wm ? Math.round(canvasW * 0.042) : 0;
    canvasH = cellH + wmH;
  } else {
    cellW = Math.round(CELL * Math.max(refAspect, 0.55));
    cellH = Math.round(cellW / refAspect);
    canvasW = cellW;
    wmH = wm ? Math.round(canvasW * 0.055) : 0;
    canvasH = cellH*2 + gap + wmH;
  }

  canvas.width = canvasW; canvas.height = canvasH;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvasW,canvasH);

  if(state.layout === 'h'){
    drawFit(a, 0, 0, cellW, cellH, state.fit);
    drawFit(b, cellW+gap, 0, cellW, cellH, state.fit);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(cellW, 0, gap, cellH); // divider
    if(showLabels){ drawLabel(labelA, 0, 0, cellH); drawLabel(labelB, cellW+gap, 0, cellH); }
  } else {
    drawFit(a, 0, 0, cellW, cellH, state.fit);
    drawFit(b, 0, cellH+gap, cellW, cellH, state.fit);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, cellH, cellW, gap);
    if(showLabels){ drawLabel(labelA, 0, 0, cellH); drawLabel(labelB, 0, cellH+gap, cellH); }
  }

  // watermark strip
  if(wm){
    ctx.fillStyle = '#006B99';
    ctx.fillRect(0, canvasH - wmH, canvasW, wmH);
    const fs = Math.round(wmH * 0.46);
    ctx.font = '700 ' + fs + 'px -apple-system, "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.letterSpacing && (ctx.letterSpacing = (fs*0.12)+'px');
    ctx.fillText(wm.toUpperCase(), canvasW/2, canvasH - wmH/2 + 1);
    ctx.letterSpacing && (ctx.letterSpacing = '0px');
  }
}

/* ============ EXPORT ============ */
function stamp(){
  const d = new Date();
  return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+
         '_'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0');
}
function download(){
  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'BeforeAfter_EMD-KOR_' + stamp() + '.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    toast('Downloaded ✓');
  }, 'image/png');
}
async function copyImg(){
  try{
    const blob = await new Promise(r=>canvas.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    toast('Copied — paste into WhatsApp ✓');
  }catch(e){ toast('Copy not supported here — use Download'); }
}

/* ============ TOAST ============ */
let toastT;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
